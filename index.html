<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>Hectoc Math Game</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  text-align: center;
}

.title {
  font-size: 42px;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 18px;
  opacity: 0.8;
  margin-bottom: 25px;
}

.card {
  width: 380px;
  padding: 25px;
  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.15);

  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.numbers {
  font-size: 22px;
  margin-bottom: 15px;
  color: #60a5fa;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  text-align: center;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;

  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: white;
  font-size: 16px;
  font-weight: bold;

  transition: 0.25s;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #22c55e, #3b82f6);
}

.result {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

.bad {
  color: #ef4444;
}

.good {
  color: #22c55e;
}
</style>
</head>

<body>

<div class="container">

  <h1 class="title">ZED Games</h1>
  <h2 class="subtitle">🧠 Hectoc Math Challenge</h2>
    <h2 class="subtitle">Exemple: 517837  Result: ((((5+1)+7)*8)+3)-7</h2>
  

  <div class="card">

    <p class="numbers" id="numbers"></p>

    <input type="text" id="expression" placeholder="Enter expression...">

    <button onclick="checkResult()">Check Answer</button>

    <div class="result" id="result"></div>

  </div>

</div>

<script>
const allSets = [
  [5,1,7,8,3,7],
  [9,8,7,6,5,4],
  [2,5,2,5,2,5],
  [6,6,6,6,6,6],
  [3,4,2,1,6,2],
  [1,7,9,2,4,5],
  [5,1,8,9,1,7],
  [3,4,6,6,6,6],
  [2,3,4,6,1,3],
  [5,2,6,4,1,9],
  [1,2,7,9,3,9],
  [1,2,5,1,8,2],
  [3,1,8,4,7,1],
  [5,6,6,3,2,3],
  [8,2,5,1,7,6],
  [1,9,6,4,6,6],
  [1,9,5,2,2,9],
	[6,7,6,1,9,9],
  [7,1,9,7,4,9],
  [5,3,2,9,4,5],
	[7,5,5,7,4,9],
	[8,3,6,1,5,7],
	[2,5,5,2,7,3],
	[1,4,2,1,7,6],
	[1,6,5,8,2,9],
	[3,1,4,6,1,3],
	[7,4,7,9,2,9],
	[8,6,8,7,2,5],
	[1,4,6,7,3,5],
	[7,1,2,4,8,5],
	[4,2,6,7,9,8],
	[9,4,2,5,7,5],
	[9,7,2,9,4,3],
	[1,3,6,5,4,5],
	[4,5,3,9,2,7],
  [1,9,4,2,6,9],
  [7,4,9,4,4,2],
  [7,3,7,9,2,7],
  [7,8,7,1,2,2],
  [4,4,2,8,6,9],
  [7,4,7,3,8,6],
  [9,6,1,9,3,6],
  [2,6,1,9,9,2],
  [2,7,2,4,8,6],
];

let numbers = allSets[Math.floor(Math.random() * allSets.length)];
document.getElementById("numbers").textContent =
"🔢 Numbers: " + numbers.join(' ');

function checkResult() {
  const expr = document.getElementById("expression").value;
  const resDiv = document.getElementById("result");

  const usedDigits = expr.replace(/[^0-9]/g, '');
  let digitsInNumbers = numbers.join('');
  let index = 0;
  let ordered = true;

  for (let i = 0; i < usedDigits.length; i++) {
    const pos = digitsInNumbers.indexOf(usedDigits[i], index);
    if (pos === -1) {
      ordered = false;
      break;
    }
    index = pos + 1;
  }

  try {
    const result = eval(expr);

    if (!ordered) {
      resDiv.textContent = "❌ Must use numbers in order!";
      resDiv.className = "result bad";
    }
    else if (result === 100) {
      resDiv.textContent = "🎉 Correct! You made 100!";
      resDiv.className = "result good";
    }
    else {
      resDiv.textContent = "❌ Result = " + result + " (not 100)";
      resDiv.className = "result bad";
    }

  } catch (e) {
    resDiv.textContent = "❌ Invalid expression!";
    resDiv.className = "result bad";
  }
}
</script>

</body>
</html>
